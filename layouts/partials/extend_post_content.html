{{- if .IsPage -}}
{{- $slug := .File.ContentBaseName -}}

{{/* === 相关思维模型推荐 === */}}
{{- $related := index .Site.Data.related $slug -}}
{{- if $related -}}
<section class="related-models">
  <h2 class="related-title">🔗 相关思维模型</h2>
  <div class="related-grid">
    {{- range $related }}
    <a class="related-card" href="/models/{{ .slug }}/">
      <span class="related-card-title">{{ .title }}</span>
    </a>
    {{- end }}
  </div>
</section>
{{- end -}}

{{/* === AI 问答区 === */}}
<section class="ai-qa-section" data-slug="{{ $slug }}" data-title="{{ .Title }}">
  <h2 class="ai-qa-title">🤖 问 AI 关于「{{ .Title }}」</h2>
  <div class="ai-qa-presets">
    <button class="ai-qa-btn" data-q="用一句话解释{{ .Title }}的核心含义">💡 一句话解释</button>
    <button class="ai-qa-btn" data-q="{{ .Title }}在实际工作中怎么用？举个例子">📋 实际应用</button>
    <button class="ai-qa-btn" data-q="{{ .Title }}和哪些思维模型有关联？它们之间什么关系？">🔗 关联模型</button>
  </div>
  <div class="ai-qa-custom">
    <input type="text" class="ai-qa-input" placeholder="输入你的问题..." maxlength="200">
    <button class="ai-qa-send">提问</button>
  </div>
  <div class="ai-qa-result" style="display:none"></div>
</section>

<style>
.related-models{margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border,#eee)}
.related-title{font-size:1.2rem;margin-bottom:1rem;color:var(--content,#333)}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.related-card{display:block;padding:14px 18px;border-radius:10px;background:var(--code-bg,#f5f5f5);text-decoration:none;transition:all .2s;border:1px solid transparent}
.related-card:hover{border-color:var(--content,#333);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.related-card-title{font-size:14px;color:var(--content,#333);font-weight:500;line-height:1.5}

.ai-qa-section{margin-top:2.5rem;padding:24px;border-radius:12px;background:var(--code-bg,#f8f8f8);border:1px solid var(--border,#eee)}
.ai-qa-title{font-size:1.1rem;margin-bottom:16px;color:var(--content,#333)}
.ai-qa-presets{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
/* 预设按钮：浅底深字（浅色主题）/ 深底浅字（深色主题） */
.ai-qa-btn{padding:8px 16px;border:1px solid var(--border,#ddd);border-radius:8px;background:var(--theme,#fff);color:var(--content,#333);cursor:pointer;font-size:13px;transition:all .2s}
.ai-qa-btn:hover{border-color:var(--content,#333);background:var(--tertiary,#eee)}
.ai-qa-custom{display:flex;gap:8px}
.ai-qa-input{flex:1;padding:10px 14px;border:1px solid var(--border,#ddd);border-radius:8px;background:var(--theme,#fff);color:var(--content,#333);font-size:14px;outline:none}
.ai-qa-input:focus{border-color:var(--content,#333)}
/* 发送按钮：深底浅字。浅色主题下底色=#333、字色=#fff；深色主题下自动反转 */
.ai-qa-send{padding:10px 20px;border:none;border-radius:8px;background:var(--content,#333);color:var(--theme,#fff);cursor:pointer;font-size:14px;font-weight:500;transition:opacity .2s}
.ai-qa-send:hover{opacity:.85}
.ai-qa-result{margin-top:16px;padding:16px;border-radius:10px;background:var(--theme,#fff);border:1px solid var(--border,#eee);line-height:1.8;font-size:15px;color:var(--content,#333)}
.ai-qa-result a{color:var(--content,#333);text-decoration:underline}
.ai-qa-result strong{font-weight:600}
.ai-qa-loading{color:var(--secondary,#999);font-size:14px}
.ai-qa-sources{margin-top:12px;padding-top:10px;border-top:1px solid var(--border,#eee);font-size:13px;color:var(--secondary,#999)}
.ai-qa-sources a{color:var(--secondary,#999);text-decoration:underline;margin-right:12px}
</style>

<script>
(function() {
  var AI_EP = 'https://ybq-ai-search.garyyuen.workers.dev';
  var section = document.querySelector('.ai-qa-section');
  if (!section) return;
  var articleTitle = section.dataset.title;

  section.querySelectorAll('.ai-qa-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { askAI(btn.dataset.q); });
  });
  var input = section.querySelector('.ai-qa-input');
  var sendBtn = section.querySelector('.ai-qa-send');
  sendBtn.addEventListener('click', function() {
    var q = input.value.trim();
    if (q) askAI(q);
  });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      var q = input.value.trim();
      if (q) askAI(q);
    }
  });

  function askAI(question) {
    var result = section.querySelector('.ai-qa-result');
    result.style.display = 'block';
    result.innerHTML = '<span class="ai-qa-loading">🤔 正在思考...</span>';

    fetch(AI_EP, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: '关于「' + articleTitle + '」：' + question })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        result.innerHTML = '<span style="color:#c33">' + data.error + '</span>';
        return;
      }
      var html = data.answer.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>')
        .replace(/\n/g, '<br>');
      result.innerHTML = html;
      if (data.sources && data.sources.length) {
        result.innerHTML += '<div class="ai-qa-sources">📎 来源：' +
          data.sources.map(function(s) { return '<a href="' + s.url + '" target="_blank">' + s.title + '</a>'; }).join('') +
          '</div>';
      }
      input.value = '';
    })
    .catch(function() {
      result.innerHTML = '<span style="color:#c33">网络错误，请稍后重试</span>';
    });
  }
})();
</script>
{{- end -}}
