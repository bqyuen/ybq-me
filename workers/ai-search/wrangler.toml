name = "ybq-ai-search"
main = "worker.js"
compatibility_date = "2024-12-01"

# 保留 workers.dev 子域名（让 Worker 可直接访问）
workers_dev = true

[vars]
LLM_BASE_URL = "https://token-plan-cn.xiaomimimo.com/v1"
LLM_MODEL = "mimo-v2.5"
SITE_URL = "https://ybq.me"
ALLOWED_ORIGIN = "https://ybq.me"

# Token 消耗统计 KV
# 2026-07-19 创建
[[kv_namespaces]]
binding = "STATS_KV"
id = "83b6cb5fa539452399ef49c79bd62023"

# MIMO_API_KEY 需要通过 `wrangler secret put MIMO_API_KEY` 设置
# STATS_KEY 需要通过 `wrangler secret put STATS_KEY` 设置（管理后台访问密钥）
# 不要写在这里，会暴露到版本控制
